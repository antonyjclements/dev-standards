# Available standards packs. Each pack installs into docs/standards/<pack>/
# and registers its standards in docs/standards/index.yml.
packs:
  react:
    summary: Architecture, state, hooks, async, and component conventions for React apps
    status: stable
  typescript:
    summary: Type-level conventions - types over interfaces, Result types, Zod boundaries, no any
    status: stable
  testing:
    summary: Test naming, AAA, determinism, scope, and object mothers
    status: stable
  routing:
    summary: Page naming, page structure, route organization and parameters
    status: stable
  styling:
    summary: Tailwind brand colors, dark mode, responsive design, useCss hook
    status: stable
  lambda-api:
    summary: TypeScript AWS Lambda HTTP API conventions
    status: starter
  cli:
    summary: Node/TypeScript CLI conventions
    status: starter
